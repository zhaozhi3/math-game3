<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>代數全平衡 31.0 比例優化版 📱🖥️</title>
    <style>
        :root { 
            --pink: #ff5c8d; --blue: #4f46e5; --orange: #f59e0b; --purple: #9333ea; 
            --line-y: 300px; 
            /* 方塊大小隨螢幕寬度自動縮放：手機約 65px，電腦約 85px */
            --blk-sz: clamp(65px, 12vw, 85px); 
        }
        * { touch-action: none; box-sizing: border-box; -webkit-user-select: none; }
        body { font-family: "PingFang TC", sans-serif; background: #fff5f8; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* 響應式佈局：手機版選單置頂 */
        #sidebar { width: 180px; background: #ffebf2; border-right: 3px solid #ffc2d4; display: flex; flex-direction: column; padding: 15px; z-index: 100; }
        #main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px; position: relative; }
        
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; flex-direction: row; border-right: none; border-bottom: 3px solid #ffc2d4; overflow-x: auto; padding: 8px; }
            .lvl-btn { margin-bottom: 0 !important; margin-right: 8px; font-size: 13px; padding: 8px 12px; }
            #header-task { font-size: 20px !important; }
            :root { --line-y: 260px; } /* 手機版軌道稍微往上一點點 */
        }

        .lvl-btn { background: white; border: 2px solid #ffc2d4; border-radius: 12px; padding: 10px; margin-bottom: 10px; cursor: pointer; text-align: center; white-space: nowrap; }
        .lvl-btn.active { background: var(--pink); color: white; }

        #header-task { width: 95%; background: white; border: 3px solid #ffc2d4; border-radius: 15px; padding: 10px; text-align: center; font-size: 24px; font-weight: bold; color: #555; }
        
        #stage { 
            position: relative; width: 100%; max-width: 1000px; flex-grow: 1; 
            background: white; border: 4px solid #ffc2d4; border-radius: 30px; 
            margin: 10px 0; overflow: hidden;
        }
        #line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; border-left: 2px dashed #ffc2d4; }
        #equal-sign { 
            position: absolute; left: 50%; top: var(--line-y); transform: translate(-50%, -15%); 
            width: 55px; height: 55px; background: white; border: 4px solid var(--pink); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 30px; font-weight: bold; color: var(--pink); z-index: 5; 
        }

        .zero-bg { position: absolute; top: var(--line-y); transform: translateY(-15%); font-size: 120px; font-weight: bold; color: #f9f9f9; z-index: 1; opacity: 0; transition: 0.3s; pointer-events: none; }
        #zero-L { left: 18%; } #zero-R { right: 18%; }
        .zero-bg.active { opacity: 1; }

        .block { 
            position: absolute; width: var(--blk-sz); height: var(--blk-sz); border-radius: 18px; 
            color: white; font-weight: bold; font-size: calc(var(--blk-sz) * 0.3); cursor: grab; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 5px 0px rgba(0,0,0,0.1); z-index: 10;
            top: var(--line-y);
        }
        .x-block { background: var(--blue); }
        .n-block { background: var(--orange); }

        .paren-container { 
            position: absolute; width: calc(var(--blk-sz) * 4.5); height: calc(var(--blk-sz) * 1.5); 
            border: 3px dashed var(--purple); border-radius: 25px; 
            background: rgba(147, 51, 234, 0.03); top: calc(var(--line-y) - (var(--blk-sz) * 0.25)); 
        }
        .launcher { 
            position: absolute; left: 10px; top: 15px; 
            width: calc(var(--blk-sz) * 0.9); height: calc(var(--blk-sz) * 0.9); 
            background: white; border: 3px solid var(--purple); border-radius: 15px; 
            color: var(--purple); font-size: calc(var(--blk-sz) * 0.4); font-weight: bold; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 20; 
        }
        .launcher.gone { opacity: 0; transform: scale(0); }

        .flying-item { position: fixed; width: 50px; height: 50px; background: white; border: 3px solid var(--blue); border-radius: 50%; color: var(--blue); font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 2000; font-size: 22px; pointer-events: none; }
        
        .frac-v { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; }
        .frac-v-line { width: 100%; height: 2px; background: currentColor; margin: 2px 0; }
        
        #final-ans-box { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; align-items: center; font-size: 36px; font-weight: bold; color: var(--pink); background: white; padding: 10px 30px; border-radius: 20px; border: 5px solid var(--pink); z-index: 100; box-shadow: 0 8px 25px rgba(255,92,141,0.2); }
        #reset-btn { margin-bottom: 5px; padding: 8px 20px; border-radius: 20px; border: 2px solid var(--pink); background: white; color: var(--pink); font-weight: bold; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="lvl-btn" onclick="loadLevel(0)">題型 1</div>
        <div class="lvl-btn" onclick="loadLevel(1)">題型 2</div>
        <div class="lvl-btn" onclick="loadLevel(2)">題型 3</div>
        <div class="lvl-btn" onclick="loadLevel(3)">題型 4</div>
    </div>

    <div id="main">
        <div id="header-task">方程式</div>
        <div id="stage">
            <div id="line"></div>
            <div id="equal-sign">=</div>
            <div id="zero-L" class="zero-bg">0</div>
            <div id="zero-R" class="zero-bg">0</div>
            <div id="final-ans-box"></div>
        </div>
        <button id="reset-btn" onclick="resetLevel()">重設本題 ↺</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>

    <script>
        const levels = [
            { t: "8x - 32 = 4x", b: [{v:8, ty:'x', x:0.1}, {v:-32, ty:'n', x:0.25}, {v:4, ty:'x', x:0.75}] },
            { t: "7x + 8 = -6x", b: [{v:7, ty:'x', x:0.1}, {v:8, ty:'n', x:0.25}, {v:-6, ty:'x', x:0.75}] },
            { t: "3x - 15 = -2x", b: [{v:3, ty:'x', x:0.1}, {v:-15, ty:'n', x:0.25}, {v:-2, ty:'x', x:0.75}] },
            { t: "2(x + 3) = 6x", isDist: true, m: 2, inner: [{v:1, ty:'x', x:0.3}, {v:3, ty:'n', x:0.6}], target: {v:6, ty:'x', x:0.75} }
        ];

        let curIdx = 0, lock = false;

        function gcd(a, b) { return b === 0 ? Math.abs(a) : gcd(b, a % b); }

        function loadLevel(idx) {
            curIdx = idx; lock = false;
            const stageW = $("#stage").width();
            $(".lvl-btn").removeClass("active").eq(idx).addClass("active");
            $("#header-task").text(levels[idx].t);
            $("#final-ans-box").hide().empty();
            $(".block, .paren-container").remove();
            
            const lvl = levels[idx];
            if(lvl.isDist) {
                let $cont = $(`<div class="paren-container" id="p-wrap">
                    <div class="launcher" id="l-btn" onclick="launchDist(${lvl.m})">${lvl.m}</div>
                    <span style="position:absolute;left:25%;top:5px;font-size:70px;color:var(--purple);font-weight:200">(</span>
                    <span style="position:absolute;right:5%;top:5px;font-size:70px;color:var(--purple);font-weight:200">)</span>
                </div>`).css({left: stageW * 0.05});
                $("#stage").append($cont);
                const contW = $cont.width();
                lvl.inner.forEach((o, i) => {
                    let $ib = $(`<div class="block ${o.ty}-block" id="target-${i}">${o.v==1?'x':'+'+o.v}</div>`);
                    $ib.css({left: contW * o.x, top: 15, width: 'calc(var(--blk-sz)*0.8)', height: 'calc(var(--blk-sz)*0.8)'}).data({v: o.v, t: o.ty, s: 'L'});
                    $cont.append($ib);
                });
                addBlk(lvl.target.v, lvl.target.ty, stageW * lvl.target.x, 'R');
            } else {
                lvl.b.forEach(o => addBlk(o.v, o.ty, stageW * o.x, o.x < 0.5 ? 'L' : 'R'));
            }
            refreshAll();
        }

        function addBlk(v, t, x, s) {
            let $d = $(`<div class="block ${t}-block"></div>`).css({left: x}).data({v, t, s});
            $("#stage").append($d);
            $d.draggable({
                axis: "x",
                containment: "#stage",
                drag: function() {
                    const mid = $("#stage").width() / 2;
                    let side = ($(this).position().left + ($(".block").width()/2)) < mid ? 'L' : 'R';
                    if($(this).data('s') !== side) { 
                        $(this).data({v: -$(this).data('v'), s: side}); 
                    }
                    refreshAll();
                },
                stop: function() { 
                    checkMerge($(this)); 
                    refreshAll();
                    setTimeout(checkWin, 200); 
                }
            });
        }

        function refreshAll() {
            ['L', 'R'].forEach(s => {
                let bs = $(".block:visible").not("[id*='target']").filter(function(){ return $(this).data('s') === s });
                bs.sort((a,b) => $(a).position().left - $(b).position().left);
                bs.each(function(i){
                    let v = $(this).data('v'), t = $(this).data('t');
                    let p = (v > 0 && i > 0) ? "+" : "";
                    let txt = (t === 'x') ? (v === 1 ? "x" : v === -1 ? "-x" : v + "x") : v;
                    $(this).text(p + txt);
                });
                $(`#zero-${s}`).toggleClass("active", (bs.length === 0 && !$("#p-wrap").length));
            });
        }

        function checkMerge($el) {
            $(".block:visible").not("[id*='target']").each(function(){
                if(this === $el[0]) return;
                if($el.data('t')==$(this).data('t') && $el.data('s')==$(this).data('s') && isOver($el, $(this))) {
                    let sum = $el.data('v') + $(this).data('v');
                    if(sum===0){ $el.remove(); $(this).remove(); }
                    else { $(this).data('v', sum); $el.remove(); }
                }
            });
        }

        function isOver($a, $b) {
            let r1 = $a.position(), r2 = $b.position();
            return Math.abs(r1.left - r2.left) < ($(".block").width() * 0.7);
        }

        function launchDist(m) {
            if(lock) return; lock = true;
            $("#l-btn").addClass("gone");
            let count = 0;
            [0, 1].forEach(i => {
                let $t = $("#target-" + i);
                let $ball = $(`<div class="flying-item">${m}</div>`).css({left: $("#l-btn").offset().left, top: $("#l-btn").offset().top});
                $("body").append($ball);
                $ball.animate({ left: $t.offset().left, top: $t.offset().top }, 800, function() {
                    $(this).remove();
                    let v = $t.data('v') * m;
                    $t.data('v', v);
                    if(++count === 2) {
                        setTimeout(() => {
                            const pPos = $("#p-wrap").position();
                            addBlk($("#target-0").data('v'), 'x', pPos.left + 50, 'L');
                            addBlk($("#target-1").data('v'), 'n', pPos.left + 150, 'L');
                            $("#p-wrap").remove(); lock = false; refreshAll(); checkWin();
                        }, 500);
                    }
                });
            });
        }

        function checkWin() {
            if(lock) return;
            let blks = $(".block:visible:not([id*='target'])");
            let xB = blks.filter(function(){ return $(this).data('t')==='x' });
            let nB = blks.filter(function(){ return $(this).data('t')==='n' });
            if(xB.length === 1 && nB.length === 1 && xB.data('s') !== nB.data('s')) {
                let c = xB.data('v'), n = nB.data('v');
                if(c !== 1) xB.html(`<span class="clickable-coeff" style="border:2px solid #fff; padding:2px; border-radius:5px;" onclick="driftDown(${c},${n})">${c}</span>x`);
                else renderFinalResult(n, 1);
            }
        }

        function driftDown(c, n) {
            if(lock) return; lock = true;
            const $nb = $(".n-block");
            let $f = $(`<div class="flying-item">${c}</div>`).css({left: $(".clickable-coeff").offset().left, top: $(".clickable-coeff").offset().top});
            $("body").append($f);
            $(".x-block").text("x");
            $f.animate({ left: $nb.offset().left + 10, top: $nb.offset().top + 50 }, 1000, function(){
                $(this).remove();
                $nb.html(`<div class="frac-v"><span>${n}</span><div class="frac-v-line"></div><span style="color:#ffed00">${c}</span></div>`);
                renderFinalResult(n, c);
                lock = false;
            });
        }

        function renderFinalResult(n, c) {
            if (c < 0) { n = -n; c = -c; }
            const common = gcd(n, c);
            n /= common; c /= common;
            let html = (c === 1) ? `x = ${n}` : `x = <div class="frac-v"><span>${n}</span><div class="frac-v-line"></div><span>${c}</span></div>`;
            $("#final-ans-box").html(html).fadeIn(600);
        }

        function resetLevel() { loadLevel(curIdx); }
        $(window).on('load', () => loadLevel(0));
    </script>
</body>
</html>
