<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>代數全平衡 28.6 觸控修復版 🍬</title>
    <style>
        :root { --pink: #ff5c8d; --blue: #4f46e5; --orange: #f59e0b; --purple: #9333ea; }
        * { touch-action: none; box-sizing: border-box; -webkit-user-select: none; }
        body { font-family: "PingFang TC", sans-serif; background: #fff5f8; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        #rotate-notice {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 92, 141, 0.98); z-index: 9999; color: white;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        @media screen and (orientation: portrait) and (max-width: 768px) { #rotate-notice { display: flex; } }

        #sidebar { width: 140px; background: #ffebf2; border-right: 3px solid #ffc2d4; display: flex; flex-direction: column; padding: 10px; z-index: 1000; }
        #main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px; position: relative; }
        .lvl-btn { background: white; border: 2px solid #ffc2d4; border-radius: 10px; padding: 10px; margin-bottom: 8px; cursor: pointer; text-align: center; font-weight: bold; }
        .lvl-btn.active { background: var(--pink); color: white; }

        #header-task { width: 90%; background: white; border: 3px solid #ffc2d4; border-radius: 15px; padding: 8px; text-align: center; font-size: 20px; font-weight: bold; color: #444; margin-bottom: 5px; z-index: 1001; }
        #stage { position: relative; width: 100%; flex-grow: 1; background: white; border: 4px solid #ffc2d4; border-radius: 20px; overflow: hidden; }
        #line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; border-left: 2px dashed #ffc2d4; }
        #equal-sign { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background: white; border: 4px solid var(--pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; color: var(--pink); z-index: 50; }

        .zero-bg { position: absolute; top: 50%; transform: translateY(-50%); font-size: 100px; font-weight: bold; color: #fdf0f4; z-index: 1; opacity: 0; transition: 0.3s; pointer-events: none; }
        #zero-L { left: 15%; } #zero-R { right: 15%; }
        .zero-bg.active { opacity: 1; }

        .block { position: absolute; width: 80px; height: 80px; border-radius: 18px; color: white; font-weight: bold; font-size: 22px; cursor: grab; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0px rgba(0,0,0,0.1); z-index: 100; }
        .x-block { background: var(--blue); }
        .n-block { background: var(--orange); }

        .paren-container { position: absolute; width: 230px; height: 100px; border: 3px dashed var(--purple); border-radius: 20px; background: rgba(147, 51, 234, 0.05); z-index: 10; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .launcher { width: 55px; height: 55px; background: white; border: 3px solid var(--purple); border-radius: 12px; color: var(--purple); font-size: 26px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .p-char { font-size: 55px; color: var(--purple); font-weight: 200; }
        .inner-block { position: relative !important; top: 0 !important; left: 0 !important; width: 60px !important; height: 60px !important; font-size: 18px !important; }

        #final-ans-box { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; font-size: 40px; font-weight: bold; color: var(--pink); background: rgba(255, 255, 255, 0.98); padding: 10px 45px; border-radius: 15px; border: 5px solid var(--pink); z-index: 1500; }

        /* 修復後的點擊區域 */
        .clickable-coeff { 
            display: inline-block; background: var(--pink) !important; color: white !important; 
            padding: 8px 18px; border-radius: 10px; cursor: pointer; border: 2px solid white; 
            box-shadow: 0 4px 10px rgba(255,92,141,0.5); font-weight: 900;
            pointer-events: auto !important; /* 強制接收事件 */
        }

        .flying-item { position: fixed; width: 50px; height: 50px; background: white; border: 3px solid var(--blue); border-radius: 50%; color: var(--blue); font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 3000; font-size: 22px; pointer-events: none; }
        .frac-v { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; }
        .frac-v-line { width: 100%; height: 3px; background: currentColor; margin: 2px 0; }
    </style>
</head>
<body>

    <div id="rotate-notice">
        <div style="font-size: 60px;">🔄</div>
        <h2>請將手機轉向「橫螢幕」</h2>
        <p>橫向操作感應最準確！</p>
    </div>

    <div id="sidebar">
        <div class="lvl-btn" onclick="loadLevel(0)">題型 1</div>
        <div class="lvl-btn" onclick="loadLevel(1)">題型 2</div>
        <div class="lvl-btn" onclick="loadLevel(2)">題型 3</div>
        <div class="lvl-btn" onclick="loadLevel(3)">題型 4</div>
        <button onclick="resetLevel()" style="margin-top:auto; padding:12px; border-radius:10px; border:2px solid #ccc; background:white; cursor:pointer; font-weight:bold;">重設 ↺</button>
    </div>

    <div id="main">
        <div id="header-task">載入中...</div>
        <div id="stage">
            <div id="line"></div>
            <div id="equal-sign">=</div>
            <div id="zero-L" class="zero-bg">0</div>
            <div id="zero-R" class="zero-bg">0</div>
            <div id="final-ans-box"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>

    <script>
        const levels = [
            { t: "8x - 32 = 4x", b: [{v:8, ty:'x', x:0.1, y:0.4}, {v:-32, ty:'n', x:0.25, y:0.4}, {v:4, ty:'x', x:0.7, y:0.4}] },
            { t: "7x + 8 = -6x", b: [{v:7, ty:'x', x:0.1, y:0.4}, {v:8, ty:'n', x:0.25, y:0.4}, {v:-6, ty:'x', x:0.7, y:0.4}] },
            { t: "3x - 15 = -2x", b: [{v:3, ty:'x', x:0.1, y:0.4}, {v:-15, ty:'n', x:0.25, y:0.4}, {v:-2, ty:'x', x:0.7, y:0.4}] },
            { t: "2(x + 3) = 6x", isDist: true, m: 2, inner: [{v:1, ty:'x'}, {v:3, ty:'n'}], target: {v:6, ty:'x', x:0.75, y:0.4} }
        ];

        let curIdx = 0, lock = false;
        function gcd(a, b) { return b === 0 ? Math.abs(a) : gcd(b, a % b); }

        function loadLevel(idx) {
            curIdx = idx; lock = false;
            const sw = $("#stage").width();
            const sh = $("#stage").height();
            $(".lvl-btn").removeClass("active").eq(idx).addClass("active");
            $("#header-task").text("題目：" + levels[idx].t);
            $("#final-ans-box").hide();
            $(".block, .paren-container").remove();
            
            const lvl = levels[idx];
            if(lvl.isDist) {
                let $p = $(`<div class="paren-container">
                    <div class="launcher" onpointerdown="launchDist(${lvl.m})">${lvl.m}</div>
                    <span class="p-char">(</span>
                    <span class="p-char">)</span>
                </div>`).css({ left: sw * 0.08, top: sh * 0.35 });
                $("#stage").append($p);
                lvl.inner.forEach((o, i) => {
                    let $ib = $(`<div class="block ${o.ty}-block inner-block" id="target-${i}">${o.v==1?'x':'+'+o.v}</div>`);
                    $ib.data({v: o.v, t: o.ty, s: 'L'}).insertBefore($p.find(".p-char").last());
                });
                addBlk(lvl.target.v, lvl.target.ty, sw * lvl.target.x, sh * lvl.target.y, 'R');
            } else {
                lvl.b.forEach(o => addBlk(o.v, o.ty, sw * o.x, sh * o.y, o.x < 0.5 ? 'L' : 'R'));
            }
            refresh();
        }

        function addBlk(v, t, x, y, s) {
            let $d = $(`<div class="block ${t}-block"></div>`).css({ left: x, top: y }).data({v, t, s});
            $("#stage").append($d);
            $d.draggable({
                containment: "#stage",
                start: function() { $(this).css('z-index', 500); },
                drag: function() {
                    let mid = $("#stage").width() / 2;
                    let side = ($(this).offset().left + 40) < ($("#stage").offset().left + mid) ? 'L' : 'R';
                    if($(this).data('s') !== side) { 
                        $(this).data({v: -$(this).data('v'), s: side}); 
                        refresh(); 
                    }
                },
                stop: function() { 
                    $(this).css('z-index', 100);
                    checkMerge($(this)); 
                    refresh(); 
                    setTimeout(checkWin, 200); 
                }
            });
        }

        function refresh() {
            ['L', 'R'].forEach(s => {
                let bs = $(".block:visible").not("[id*='target']").filter(function(){ return $(this).data('s') === s });
                bs.each(function(i){
                    let v = $(this).data('v'), t = $(this).data('t');
                    let p = (v > 0 && i > 0) ? "+" : "";
                    $(this).text(p + (t==='x' ? (v===1?"x":v===-1?"-x":v+"x") : v));
                });
                let isParenExist = (s === 'L' && $(".paren-container").length > 0);
                $(`#zero-${s}`).toggleClass("active", (bs.length === 0 && !isParenExist));
            });
        }

        function checkMerge($el) {
            $(".block:visible").not("[id*='target']").each(function(){
                if(this === $el[0]) return;
                if($el.data('t')==$(this).data('t') && $el.data('s')==$(this).data('s') && isOver($el, $(this))) {
                    let sum = $el.data('v') + $(this).data('v');
                    if(sum===0){ $el.remove(); $(this).remove(); }
                    else { $(this).data('v', sum); $el.remove(); }
                    refresh();
                }
            });
        }

        function isOver($a, $b) {
            let r1 = $a.offset(), r2 = $b.offset();
            return !(r1.left + 50 < r2.left || r1.left > r2.left + 50 || r1.top + 50 < r2.top || r1.top > r2.top + 50);
        }

        function launchDist(m) {
            if(lock) return; lock = true;
            $(".launcher").fadeOut();
            let count = 0;
            [0, 1].forEach(i => {
                let $t = $("#target-" + i);
                let $ball = $(`<div class="flying-item">${m}</div>`).css({ left: $(".launcher").offset().left, top: $(".launcher").offset().top });
                $("body").append($ball);
                $ball.animate({ left: $t.offset().left, top: $t.offset().top }, 600, function() {
                    $(this).remove();
                    let v = $t.data('v') * m; $t.data('v', v);
                    if(++count === 2) {
                        setTimeout(() => {
                            let pPos = $(".paren-container").position();
                            addBlk($("#target-0").data('v'), 'x', pPos.left + 10, pPos.top + 10, 'L');
                            addBlk($("#target-1").data('v'), 'n', pPos.left + 110, pPos.top + 10, 'L');
                            $(".paren-container").remove(); lock = false; refresh(); checkWin();
                        }, 400);
                    }
                });
            });
        }

        function checkWin() {
            if(lock) return;
            let blks = $(".block:visible:not([id*='target'])");
            let xB = blks.filter(function(){ return $(this).data('t')==='x' });
            let nB = blks.filter(function(){ return $(this).data('t')==='n' });
            if(xB.length === 1 && nB.length === 1 && xB.data('s') !== nB.data('s')) {
                let c = xB.data('v'), n = nB.data('v');
                if(c !== 1) {
                    // 使用 PointerDown 確保行動裝置反應
                    let btn = $(`<span class="clickable-coeff">${c}</span>`);
                    btn.on('pointerdown', (e) => { e.stopPropagation(); driftDown(c, n); });
                    xB.empty().append(btn).append("x");
                }
                else renderFinalResult(n, 1);
            }
        }

        function driftDown(c, n) {
            if(lock) return; lock = true;
            const $nb = $(".n-block");
            let $f = $(`<div class="flying-item">${c}</div>`).css({ left: $(".clickable-coeff").offset().left, top: $(".clickable-coeff").offset().top });
            $("body").append($f);
            $(".x-block").text("x");
            $f.animate({ left: $nb.offset().left + 15, top: $nb.offset().top + 60 }, 800, function(){
                $(this).remove();
                $nb.html(`<div class="frac-v"><span>${n}</span><div class="frac-v-line"></div><span style="color:#ffed00">${c}</span></div>`);
                renderFinalResult(n, c); lock = false;
            });
        }

        function renderFinalResult(n, c) {
            if (c < 0) { n = -n; c = -c; }
            const common = gcd(n, c);
            n /= common; c /= common;
            let html = (c === 1) ? `x = ${n}` : `x = <div class="frac-v"><span>${n}</span><div class="frac-v-line"></div><span>${c}</span></div>`;
            $("#final-ans-box").html(html).fadeIn(500);
        }

        function resetLevel() { loadLevel(curIdx); }
        $(window).on('resize', () => loadLevel(curIdx));
        $(window).on('load', () => loadLevel(0));
    </script>
</body>
</html>
