<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>代數全平衡 27.0 行動版 📱</title>
    <style>
        :root { --pink: #ff5c8d; --blue: #4f46e5; --orange: #f59e0b; --purple: #9333ea; }
        * { touch-action: m; box-sizing: border-box; }
        body { 
            font-family: "PingFang TC", sans-serif; 
            background: #fff5f8; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            position: fixed; /* 防止橡皮筋回彈 */
            width: 100%;
        }
        
        /* 手機版選單：改為頂部橫向 */
        #sidebar { 
            width: 100%; 
            background: #ffebf2; 
            border-bottom: 3px solid #ffc2d4; 
            display: flex; 
            flex-direction: row; 
            padding: 8px; 
            overflow-x: auto;
            white-space: nowrap;
            z-index: 100; 
        }
        .lvl-btn { 
            background: white; 
            border: 2px solid #ffc2d4; 
            border-radius: 10px; 
            padding: 8px 15px; 
            margin-right: 8px; 
            cursor: pointer; 
            font-size: 13px; 
            flex-shrink: 0;
        }
        .lvl-btn.active { background: var(--pink); color: white; }

        #main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px; position: relative; }
        #header-task { width: 100%; background: white; border: 2px solid #ffc2d4; border-radius: 12px; padding: 8px; text-align: center; font-size: 20px; font-weight: bold; color: #555; }
        
        #stage { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            background: white; 
            border: 3px solid #ffc2d4; 
            border-radius: 20px; 
            margin-top: 10px; 
            overflow: hidden;
            touch-action: none; /* 重要：防止瀏覽器攔截拖拽 */
        }
        #line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; border-left: 2px dashed #ffc2d4; }
        #equal-sign { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 44px; height: 44px; background: white; border: 3px solid var(--pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: var(--pink); z-index: 5; }

        .zero-bg { position: absolute; top: 50%; transform: translateY(-50%); font-size: 120px; font-weight: bold; color: #f2f2f2; z-index: 1; opacity: 0; transition: 0.3s; pointer-events: none; }
        #zero-L { left: 15%; } #zero-R { right: 15%; }

        .block { position: absolute; width: 75px; height: 75px; border-radius: 15px; color: white; font-weight: bold; font-size: 20px; cursor: grab; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0px rgba(0,0,0,0.1); z-index: 10; touch-action: none; }
        .x-block { background: var(--blue); }
        .n-block { background: var(--orange); }

        .paren-container { position: absolute; width: 300px; height: 120px; border: 2px dashed var(--purple); border-radius: 20px; background: rgba(147, 51, 234, 0.03); }
        .launcher { position: absolute; left: 10px; top: 25px; width: 65px; height: 65px; background: white; border: 3px solid var(--purple); border-radius: 15px; color: var(--purple); font-size: 28px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 20; }
        .launcher.gone { opacity: 0; transform: scale(0); }

        .flying-item { position: fixed; width: 50px; height: 50px; background: white; border: 3px solid var(--blue); border-radius: 50%; color: var(--blue); font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 2000; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); pointer-events: none; }
        
        .frac-v { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; }
        .frac-v-line { width: 100%; height: 2px; background: currentColor; margin: 1px 0; }
        
        #final-ans-box { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: none; align-items: center; font-size: 32px; font-weight: bold; color: var(--pink); background: white; padding: 10px 25px; border-radius: 15px; border: 4px solid var(--pink); z-index: 100; }

        #msg { font-size: 14px; font-weight: bold; color: var(--pink); margin: 5px 0; height: 20px; text-align: center; }
        .clickable-coeff { background: #fff !important; color: var(--blue) !important; padding: 2px 8px; border-radius: 8px; border: 2px solid var(--blue); }
        
        #reset-btn { margin: 10px; padding: 8px 20px; border-radius: 20px; border: 2px solid var(--pink); background: white; color: var(--pink); font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="lvl-btn" onclick="loadLevel(0)">題型 1</div>
        <div class="lvl-btn" onclick="loadLevel(1)">題型 2</div>
        <div class="lvl-btn" onclick="loadLevel(2)">題型 3</div>
        <div class="lvl-btn" onclick="loadLevel(3)">題型 4</div>
    </div>

    <div id="main">
        <div id="header-task">方程式</div>
        <div id="msg">用手指搬動方塊分家吧！</div>
        <div id="stage">
            <div id="line"></div>
            <div id="equal-sign">=</div>
            <div id="zero-L" class="zero-bg">0</div>
            <div id="zero-R" class="zero-bg">0</div>
            <div id="final-ans-box"></div>
        </div>
        <button id="reset-btn" onclick="resetLevel()">重設本題 ↺</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>

    <script>
        const levels = [
            { t: "8x - 32 = 4x", b: [{v:8, ty:'x', x:20, y:80}, {v:-32, ty:'n', x:110, y:80}, {v:4, ty:'x', x:220, y:80}] },
            { t: "7x + 8 = -6x", b: [{v:7, ty:'x', x:20, y:80}, {v:8, ty:'n', x:110, y:80}, {v:-6, ty:'x', x:220, y:80}] },
            { t: "3x - 15 = -2x", b: [{v:3, ty:'x', x:20, y:80}, {v:-15, ty:'n', x:110, y:80}, {v:-2, ty:'x', x:220, y:80}] },
            { t: "2(x + 3) = 6x", isDist: true, m: 2, inner: [{v:1, ty:'x', x:110, y:20}, {v:3, ty:'n', x:200, y:20}], target: {v:6, ty:'x', x:220, y:180} }
        ];

        let curIdx = 0, lock = false;

        function gcd(a, b) { return b === 0 ? Math.abs(a) : gcd(b, a % b); }

        function loadLevel(idx) {
            curIdx = idx; lock = false;
            $(".lvl-btn").removeClass("active").eq(idx).addClass("active");
            $("#header-task").text(levels[idx].t);
            $("#final-ans-box").hide().empty();
            $(".block, .paren-container").remove();
            
            const stageW = $("#stage").width();
            const lvl = levels[idx];

            if(lvl.isDist) {
                let $cont = $(`<div class="paren-container" id="p-wrap">
                    <div class="launcher" id="l-btn" onclick="launchDist(${lvl.m})">${lvl.m}</div>
                    <span style="position:absolute;left:80px;top:5px;font-size:80px;color:var(--purple);font-weight:200">(</span>
                    <span style="position:absolute;right:10px;top:5px;font-size:80px;color:var(--purple);font-weight:200">)</span>
                </div>`).css({left: 10, top: 100});
                $("#stage").append($cont);
                lvl.inner.forEach((o, i) => {
                    let $ib = $(`<div class="block ${o.ty}-block" id="target-${i}">${o.v==1?'x':'+'+o.v}</div>`);
                    $ib.css({left: o.x-30, top: o.y, width:65, height:65}).data({v: o.v, t: o.ty, s: 'L'});
                    $cont.append($ib);
                });
                addBlk(lvl.target.v, lvl.target.ty, stageW - 90, 150, 'R');
            } else {
                lvl.b.forEach(o => {
                    let side = o.x > (stageW/2) ? 'R' : 'L';
                    addBlk(o.v, o.ty, o.x, o.y, side);
                });
            }
            refresh();
        }

        function addBlk(v, t, x, y, s) {
            let $d = $(`<div class="block ${t}-block"></div>`).css({left: x, top: y}).data({v, t, s});
            $("#stage").append($d);
            $d.draggable({
                containment: "#stage",
                drag: function() {
                    const mid = $("#stage").width() / 2;
                    let side = ($(this).position().left + 37) < mid ? 'L' : 'R';
                    if($(this).data('s') !== side) { $(this).data({v: -$(this).data('v'), s: side}); refresh(); }
                },
                stop: function() { checkMerge($(this)); refresh(); setTimeout(checkWin, 200); }
            });
        }

        function launchDist(m) {
            if(lock) return; lock = true;
            $("#l-btn").addClass("gone");
            let count = 0;
            const startPos = $("#l-btn").offset();
            [0, 1].forEach(i => {
                let $t = $("#target-" + i);
                let $ball = $(`<div class="flying-item">${m}</div>`).css({left: startPos.left, top: startPos.top});
                $("body").append($ball);
                $ball.animate({ left: $t.offset().left, top: $t.offset().top }, 800, function() {
                    $(this).remove();
                    let v = $t.data('v') * m;
                    $t.text((v > 0 && i > 0 ? "+" : "") + v + ($t.data('t')==='x'?'x':'')).data('v', v);
                    if(++count === 2) {
                        setTimeout(() => {
                            const pPos = $("#p-wrap").position();
                            addBlk($("#target-0").data('v'), 'x', pPos.left + 50, pPos.top + 25, 'L');
                            addBlk($("#target-1").data('v'), 'n', pPos.left + 150, pPos.top + 25, 'L');
                            $("#p-wrap").remove(); lock = false; refresh(); checkWin();
                        }, 500);
                    }
                });
            });
        }

        function refresh() {
            const mid = $("#stage").width() / 2;
            ['L', 'R'].forEach(s => {
                let bs = $(".block:visible").not("[id*='target']").filter(function(){ return $(this).data('s') === s });
                bs.each(function(i){
                    let v = $(this).data('v'), t = $(this).data('t');
                    let p = (v > 0 && i > 0) ? "+" : "";
                    $(this).text(p + (t==='x' ? (v===1?"x":v===-1?"-x":v+"x") : v));
                });
                $(`#zero-${s}`).css("opacity", (bs.length === 0 && !$("#p-wrap").length) ? "1" : "0");
            });
        }

        function checkMerge($el) {
            $(".block:visible").not("[id*='target']").each(function(){
                if(this === $el[0]) return;
                if($el.data('t')==$(this).data('t') && $el.data('s')==$(this).data('s') && isOver($el, $(this))) {
                    let sum = $el.data('v') + $(this).data('v');
                    if(sum===0){ $el.remove(); $(this).remove(); }
                    else { $(this).data('v', sum); $el.remove(); }
                    refresh();
                }
            });
        }

        function isOver($a, $b) {
            let r1 = $a[0].getBoundingClientRect(), r2 = $b[0].getBoundingClientRect();
            return !(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom);
        }

        function checkWin() {
            if(lock) return;
            let blks = $(".block:visible").not("[id*='target']");
            let xB = blks.filter(function(){ return $(this).data('t')==='x' });
            let nB = blks.filter(function(){ return $(this).data('t')==='n' });
            if(xB.length === 1 && nB.length === 1 && xB.data('s') !== nB.data('s')) {
                let c = xB.data('v'), n = nB.data('v');
                if(c !== 1) xB.html(`<span class="clickable-coeff" onclick="driftDown(${c},${n})">${c}</span>x`);
                else renderFinalResult(n, 1);
            }
        }

        function driftDown(c, n) {
            if(lock) return; lock = true;
            const $nb = $(".n-block");
            const startPos = $(".clickable-coeff").offset();
            const targetPos = $nb.offset();
            let $f = $(`<div class="flying-item">${c}</div>`).css({left: startPos.left, top: startPos.top});
            $("body").append($f);
            $(".x-block").text("x");
            $f.animate({ left: targetPos.left + 10, top: targetPos.top + 60 }, 1000, function(){
                $(this).remove();
                $nb.html(`<div class="frac-v"><span>${n}</span><div class="frac-v-line"></div><span style="color:#ffed00">${c}</span></div>`);
                renderFinalResult(n, c);
                lock = false;
            });
        }

        function renderFinalResult(n, c) {
            if (c < 0) { n = -n; c = -c; }
            const common = gcd(n, c);
            n /= common; c /= common;
            let html = (c === 1) ? `x = ${n}` : `x = <div class="frac-v"><span>${n}</span><div class="frac-v-line"></div><span>${c}</span></div>`;
            $("#final-ans-box").html(html).fadeIn(600);
        }

        function resetLevel() { loadLevel(curIdx); }
        $(window).on('load', () => loadLevel(0));
    </script>
</body>
</html>
